services:
  app:
    build:
      context: ..
      dockerfile: ./dockers/Dockerfile
    volumes:
      - ..:/workspaces/langchain_ollama_mcp:cached
      - ollama-data:/root/.ollama
    command: ollama serve
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    security_opt:
      - apparmor:unconfined
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - OLLAMA_HOST=0.0.0.0
    depends_on:
      - weather_tools
      - search_tools
  weather_tools:
    build:
      context: ..
      dockerfile: ./dockers/Dockerfile
    volumes:
      - ..:/workspaces/langchain_ollama_mcp:cached
      - ollama-data:/root/.ollama
    command: python /workspaces/langchain_ollama_mcp/weather_tools/main.py
    ports:
      - "8000:8000"
    security_opt:
      - apparmor:unconfined
  search_tools:
    build:
      context: ..
      dockerfile: ./dockers/Dockerfile
    volumes:
      - ..:/workspaces/langchain_ollama_mcp:cached
      - ollama-data:/root/.ollama
    command: python /workspaces/langchain_ollama_mcp/search_tools/main.py
    ports:
      - "8001:8001"
    security_opt:
      - apparmor:unconfined

volumes:
  ollama-data:
